<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOBI HUB Design Studio</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- html2canvas -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <!-- FontAwesome for App Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: 'var(--theme-color)',
                        brandBg: 'var(--theme-bg)',
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
        
        :root {
            --theme-color: #1a88c9; /* Mobi Blue */
            --theme-bg: rgba(26, 136, 201, 0.15);
        }
        
        .theme-mobi { --theme-color: #1a88c9; --theme-bg: rgba(26, 136, 201, 0.15); }
        .theme-cyan { --theme-color: #06b6d4; --theme-bg: rgba(6, 182, 212, 0.15); }
        .theme-slate { --theme-color: #64748b; --theme-bg: rgba(100, 116, 139, 0.15); }
        .theme-violet { --theme-color: #8b5cf6; --theme-bg: rgba(139, 92, 246, 0.15); }
        .theme-blue { --theme-color: #3b82f6; --theme-bg: rgba(59, 130, 246, 0.15); }
        .theme-rose { --theme-color: #f43f5e; --theme-bg: rgba(244, 63, 94, 0.15); }
        .theme-amber { --theme-color: #f59e0b; --theme-bg: rgba(245, 158, 11, 0.15); }
        .theme-emerald { --theme-color: #10b981; --theme-bg: rgba(16, 185, 129, 0.15); }

        body {
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
            overflow: hidden; 
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .dark ::-webkit-scrollbar-thumb { background: #475569; }

        /* 3D Canvas Scale Wrapper */
        .canvas-wrapper {
            transform-origin: center center;
            transition: transform 0.1s ease-out;
            will-change: transform;
            transform-style: preserve-3d;
        }

        /* Yellow Tag Highlight */
        .marker-highlight {
            background-color: #ffeb3b;
            color: #111827;
            box-shadow: 2px 4px 0px rgba(0,0,0,0.1);
            border: 1px solid #facc15;
            transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .marker-highlight:hover {
            transform: scale(1.05) rotate(-1deg);
        }

        /* Animations */
        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.8) translateY(10px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }
        .animate-pop-in {
            animation: popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        @keyframes badgePulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.3); }
            100% { transform: scale(1); }
        }
        .animate-badge-pulse {
            animation: badgePulse 0.3s ease-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        .animate-shake {
            animation: shake 0.2s ease-in-out 2;
        }

        /* Fade out bottom of list if it overflows heavily */
        .mask-bottom {
            -webkit-mask-image: linear-gradient(to bottom, black 85%, transparent 100%);
            mask-image: linear-gradient(to bottom, black 85%, transparent 100%);
        }

        /* Confetti Particles */
        .particle {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            animation: shoot 1s ease-out forwards;
        }
        @keyframes shoot {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
        }

        #toast-container {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            pointer-events: none;
        }
        .toast {
            background: #1e293b;
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 9999px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.875rem;
            font-weight: 600;
            opacity: 0;
            transform: translateY(1rem);
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .toast.show {
            opacity: 1;
            transform: translateY(0);
        }
        .toast.error {
            background: #ef4444;
        }
    </style>
</head>
<body class="bg-white dark:bg-gray-900 text-gray-800 dark:text-gray-200 h-screen w-screen transition-colors duration-300 flex">

                            <option value="iPhone 12 Pro Max">iPhone 12 Pro Max</option>

                        <!-- Logo Area -->

                            <img id="canvas-logo" src="Mobi-Hub Logo.png" alt="Mobi Hub" class="max-h-full max-w-[200px] object-contain drop-shadow-md">

                                <svg class="w-8 h-8 text-brand drop-shadow-md" fill="currentColor" viewBox="0 0 24 24"><path d="M17 2H7C4.243 2 2 4.243 2 7v10c0 2.757 2.243 5 5 5h10c2.757 5 5-2.243 5-5V7c0-2.757-2.243-5-5-5zm-5 18c-1.103 0-2-.897-2-2s.897-2 2-2 2 .897 2 2-.897 2-2 2zm4-6H8V6h8v8z"/></svg>
                                MOBI<span class="text-brand">HUB</span>
                            </div>
                        </div>

                        <div class="w-12 h-1 bg-brand rounded-full mb-3 shadow-[0_0_12px_var(--theme-color)]"></div>
                        
                        <!-- Story Preset Title -->
                        <h2 id="canvas-title" class="text-2xl font-black text-gray-900 dark:text-white tracking-tight uppercase text-center drop-shadow-sm transition-all duration-300">
                            🔥 WTS 🔥
                        </h2>
                    </div>

                    <!-- Canvas Body -->
                    <div id="canvas-list" class="flex-1 flex flex-col items-center justify-start overflow-hidden w-full space-y-2 relative mask-bottom">
                        <div class="h-full w-full flex flex-col items-center justify-center opacity-40 text-center px-4 transition-opacity duration-300" id="canvas-empty-state">
                            <i class="fa-solid fa-box-open text-5xl mb-4 text-brand"></i>
                            <p class="text-base font-bold text-gray-500 dark:text-gray-400">Inventory is empty</p>
                            <p class="text-xs text-gray-400 mt-2">Add items from the panel to generate your design live.</p>
                        </div>
                    </div>

                    <!-- Canvas Footer -->
                    <div class="mt-auto pt-6 flex flex-col items-center w-full relative z-20">
                        <!-- Call to Action -->
                        <div class="w-full bg-gray-900 dark:bg-white text-white dark:text-gray-900 font-black text-lg py-4 rounded-2xl text-center shadow-[0_8px_30px_rgba(0,0,0,0.12)] tracking-wide uppercase mb-4 transition-transform hover:scale-[1.02] cursor-default">
                            📩 DM TO ORDER NOW
                        </div>
                        
                        <!-- Trust Badges -->
                        <div class="flex items-center justify-center gap-3 text-[9px] font-bold text-gray-600 dark:text-gray-400 uppercase tracking-widest mb-3 w-full px-1">
                            <div class="flex items-center gap-1.5 bg-gray-100 dark:bg-gray-800 px-2.5 py-1.5 rounded-lg border border-gray-200/50 dark:border-gray-700/50 shadow-sm">
                                <svg class="w-3.5 h-3.5 text-brand" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                                Verified
                            </div>
                            <div class="flex items-center gap-1.5 bg-gray-100 dark:bg-gray-800 px-2.5 py-1.5 rounded-lg border border-gray-200/50 dark:border-gray-700/50 shadow-sm">
                                <svg class="w-3.5 h-3.5 text-brand" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 17a2 2 0 11-4 0 2 2 0 014 0zM19 17a2 2 0 11-4 0 2 2 0 014 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16V6a1 1 0 00-1-1H4a1 1 0 00-1 1v10a1 1 0 001 1h1m8-1a1 1 0 01-1 1H9m4-1V8a1 1 0 011-1h2.586a1 1 0 01.707.293l3.414 3.414a1 1 0 01.293.707V16a1 1 0 01-1 1h-1m-6-1a1 1 0 001 1h1M5 17a2 2 0 104 0m-4 0a2 2 0 114 0m6 0a2 2 0 104 0m-4 0a2 2 0 114 0"></path></svg>
                                Express
                            </div>
                            <div class="flex items-center gap-1.5 bg-gray-100 dark:bg-gray-800 px-2.5 py-1.5 rounded-lg border border-gray-200/50 dark:border-gray-700/50 shadow-sm">
                                <svg class="w-3.5 h-3.5 text-amber-500" fill="currentColor" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"></path></svg>
                                Top Rated
                            </div>
                        </div>

                        <!-- Location -->
                        <div class="flex items-center justify-center gap-2 text-[10px] font-bold text-gray-400 dark:text-gray-500 uppercase tracking-widest mt-1">
                            <i class="fa-solid fa-location-dot"></i> Germany / Netherlands
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Application Logic -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const btnDownload = document.getElementById('btn-download');
            const btnCopy = document.getElementById('btn-copy');
            const canvasList = document.getElementById('canvas-list');
            const canvasEmptyState = document.getElementById('canvas-empty-state');
            const previewContainer = document.getElementById('preview-container');
            const canvasScaler = document.getElementById('canvas-scaler');
            const toggleDarkBtn = document.getElementById('toggle-dark');
            const toggleSettingsBtn = document.getElementById('toggle-settings');
            const settingsPanel = document.getElementById('settings-panel');
            const htmlElement = document.documentElement;
            const themeBtns = document.querySelectorAll('.theme-btn');
            const storyHeaderSelect = document.getElementById('story-header');
            const canvasTitle = document.getElementById('canvas-title');
            const canvasDate = document.getElementById('canvas-date');
            const inputModel = document.getElementById('input-model');
            const inputStorage = document.getElementById('input-storage');
            const inputSpec = document.getElementById('input-spec');
            const inputGrade = document.getElementById('input-grade');
            const btnAddItem = document.getElementById('btn-add-item');
            const controlsList = document.getElementById('controls-list');
            const controlsEmptyState = document.getElementById('controls-empty-state');
            const listCount = document.getElementById('list-count');
            const logoUpload = document.getElementById('logo-upload');
            const canvasLogo = document.getElementById('canvas-logo');
            const canvasDefaultLogo = document.getElementById('canvas-default-logo');
            const controlsLogoPreview = document.getElementById('controls-logo-preview');
            const controlsLogoPlaceholder = document.getElementById('controls-logo-placeholder');

            let currentInventory = [];
            let baseScale = 1;

            // --- Custom Notification System ---
            function showToast(message, isError = false) {
                const container = document.getElementById('toast-container');
                const toast = document.createElement('div');
                toast.className = `toast ${isError ? 'error' : ''}`;
                toast.innerHTML = `<i class="fa-solid ${isError ? 'fa-circle-xmark' : 'fa-circle-check'}"></i> <span>${message}</span>`;
                container.appendChild(toast);
                setTimeout(() => toast.classList.add('show'), 10);
                setTimeout(() => {
                    toast.classList.remove('show');
                    setTimeout(() => toast.remove(), 300);
                }, 3500);
            }

            const today = new Date();
            canvasDate.textContent = today.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });

            const savedTheme = localStorage.getItem('mobiTheme') || 'theme-mobi';
            setTheme(savedTheme);

            if (localStorage.getItem('mobiDark') === 'true') {
                htmlElement.classList.add('dark');
            }

            const savedLogo = localStorage.getItem('mobiLogoBase64');
            if (savedLogo) applyLogo(savedLogo);

            function resizeCanvasWrapper() {
                const padding = window.innerWidth < 1024 ? 40 : 80;
                const containerWidth = previewContainer.clientWidth - padding;
                const containerHeight = previewContainer.clientHeight - padding;
                const scaleX = containerWidth / 414;
                const scaleY = containerHeight / 896;
                baseScale = Math.min(scaleX, scaleY, 1);
                canvasScaler.style.transform = `scale(${baseScale})`;
            }
            window.addEventListener('resize', resizeCanvasWrapper);
            resizeCanvasWrapper();

            previewContainer.addEventListener('mousemove', (e) => {
                if (window.innerWidth < 1024) return;
                const rect = previewContainer.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const rotateX = ((y - rect.height / 2) / (rect.height / 2)) * -10;
                const rotateY = ((x - rect.width / 2) / (rect.width / 2)) * 10;
                canvasScaler.style.transform = `scale(${baseScale}) perspective(1200px) rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
            });

            previewContainer.addEventListener('mouseleave', () => {
                canvasScaler.style.transform = `scale(${baseScale}) perspective(1200px) rotateX(0deg) rotateY(0deg)`;
            });

            toggleDarkBtn.addEventListener('click', () => {
                htmlElement.classList.toggle('dark');
                localStorage.setItem('mobiDark', htmlElement.classList.contains('dark'));
            });

            toggleSettingsBtn.addEventListener('click', () => {
                settingsPanel.classList.toggle('hidden');
                toggleSettingsBtn.classList.toggle('bg-gray-200');
            });

            themeBtns.forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const theme = e.target.getAttribute('data-theme');
                    setTheme(theme);
                    localStorage.setItem('mobiTheme', theme);
                });
            });

            function setTheme(themeClass) {
                htmlElement.className = htmlElement.className.replace(/theme-\w+/g, '').trim();
                htmlElement.classList.add(themeClass);
                themeBtns.forEach(b => {
                    if(b.getAttribute('data-theme') === themeClass) {
                        b.classList.add('ring-gray-400', 'dark:ring-gray-500');
                    } else {
                        b.classList.remove('ring-gray-400', 'dark:ring-gray-500');
                    }
                });
            }

            storyHeaderSelect.addEventListener('change', (e) => {
                canvasTitle.style.opacity = '0';
                setTimeout(() => {
                    canvasTitle.textContent = e.target.value;
                    canvasTitle.style.opacity = '1';
                }, 200);
            });

            logoUpload.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    applyLogo(event.target.result);
                    localStorage.setItem('mobiLogoBase64', event.target.result);
                };
                reader.readAsDataURL(file);
            });

            function applyLogo(base64Str) {
                canvasLogo.src = base64Str;
                canvasLogo.classList.remove('hidden');
                canvasDefaultLogo.classList.add('hidden');
                controlsLogoPreview.src = base64Str;
                controlsLogoPreview.classList.remove('hidden');
                controlsLogoPlaceholder.classList.add('hidden');
            }

            btnAddItem.addEventListener('click', () => {
                const model = inputModel.value;
                if (!model) {
                    inputModel.classList.add('animate-shake', 'border-red-500');
                    setTimeout(() => inputModel.classList.remove('animate-shake', 'border-red-500'), 400);
                    showToast("Please select a model.", true);
                    return;
                }
                const newItem = {
                    id: Date.now().toString(),
                    model: model,
                    storage: inputStorage.value || '',
                    spec: inputSpec.value || '',
                    grade: inputGrade.value || '',
                    modelIndex: inputModel.selectedIndex
                };
                currentInventory.push(newItem);
                listCount.classList.add('animate-badge-pulse');
                setTimeout(() => listCount.classList.remove('animate-badge-pulse'), 300);
                updateUIAndCanvas();
                inputStorage.value = ''; inputSpec.value = ''; inputGrade.value = '';
            });

            window.removeInventoryItem = function(id) {
                const itemEl = document.getElementById(`ctrl-item-${id}`);
                if(itemEl) {
                    itemEl.style.transform = 'translateX(20px)';
                    itemEl.style.opacity = '0';
                    setTimeout(() => {
                        currentInventory = currentInventory.filter(item => item.id !== id);
                        updateUIAndCanvas();
                    }, 200);
                } else {
                    currentInventory = currentInventory.filter(item => item.id !== id);
                    updateUIAndCanvas();
                }
            };

            function updateUIAndCanvas() {
                listCount.textContent = currentInventory.length;
                if (currentInventory.length === 0) {
                    controlsEmptyState.style.opacity = '1';
                    Array.from(controlsList.children).forEach(c => c.id !== 'controls-empty-state' && c.remove());
                } else {
                    controlsEmptyState.style.opacity = '0';
                    const html = currentInventory.map(item => `
                        <div id="ctrl-item-${item.id}" class="flex justify-between items-center bg-white dark:bg-gray-800 p-3 rounded-xl border border-gray-200 dark:border-gray-700 shadow-sm animate-pop-in group">
                            <div class="flex flex-col">
                                <span class="text-sm font-bold leading-tight">${item.model} ${item.storage}</span>
                                <span class="text-[11px] text-brand font-black tracking-wide leading-tight mt-1 uppercase">${item.grade} <span class="text-gray-400 font-semibold">${item.spec ? '• '+item.spec : ''}</span></span>
                            </div>
                            <button onclick="removeInventoryItem('${item.id}')" class="text-gray-400 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-all">
                                <i class="fa-solid fa-xmark"></i>
                            </button>
                        </div>
                    `).join('');
                    const emptyHtml = controlsEmptyState.outerHTML;
                    controlsList.innerHTML = emptyHtml + html;
                }
                generateCanvasOutput();
            }

            function generateCanvasOutput() {
                let itemsToRender = [...currentInventory].sort((a, b) => a.modelIndex !== b.modelIndex ? a.modelIndex - b.modelIndex : a.storage.localeCompare(b.storage));
                if (itemsToRender.length === 0) {
                    canvasEmptyState.style.display = 'flex';
                    Array.from(canvasList.children).forEach(c => c.id !== 'canvas-empty-state' && c.remove());
                    return;
                }
                canvasEmptyState.style.display = 'none';
                let currentModel = '';
                const html = itemsToRender.map(item => {
                    const isNewGroup = currentModel !== item.model && currentModel !== '';
                    currentModel = item.model;
                    return `
                    <div class="${isNewGroup ? 'mt-4' : 'mt-1.5'} flex flex-wrap items-center justify-center gap-2 text-center w-full animate-pop-in px-2">
                        <div class="marker-highlight px-3.5 py-1 rounded-[10px] font-black text-[22px] tracking-tight truncate">${item.model} ${item.storage}</div>
                        ${(item.grade || item.spec) ? `
                        <div class="text-[22px] font-extrabold text-gray-800 dark:text-gray-100 flex items-center justify-center gap-1.5">
                            ${item.grade ? `<span class="text-brand">${item.grade}</span>` : ''}
                            ${(item.grade && item.spec) ? `<span class="opacity-30 mx-0.5">•</span>` : ''}
                            ${item.spec ? `<span class="opacity-80">${item.spec}</span>` : ''}
                        </div>` : ''}
                    </div>`;
                }).join('');
                const emptyHtml = canvasEmptyState.outerHTML;
                canvasList.innerHTML = emptyHtml + html;
            }

            function shootConfetti(buttonEl) {
                const rect = buttonEl.getBoundingClientRect();
                const colors = ['#1a88c9', '#06b6d4', '#facc15', '#f43f5e', '#10b981'];
                for (let i = 0; i < 20; i++) {
                    const p = document.createElement('div');
                    p.className = 'particle';
                    p.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                    p.style.width = p.style.height = `${Math.random() * 8 + 4}px`;
                    p.style.left = `${rect.left + rect.width / 2}px`;
                    p.style.top = `${rect.top + rect.height / 2}px`;
                    p.style.setProperty('--tx', `${(Math.random() - 0.5) * 200}px`);
                    p.style.setProperty('--ty', `${(Math.random() - 0.5) * 200 - 50}px`);
                    document.body.appendChild(p);
                    setTimeout(() => p.remove(), 1000);
                }
            }

            async function captureCanvas() {
                const target = document.getElementById('story-canvas');
                const orig = canvasScaler.style.transform;
                canvasScaler.style.transform = 'scale(1)';
                await new Promise(r => setTimeout(r, 50));
                try {
                    const canvas = await html2canvas(target, { scale: 2, useCORS: true, logging: false });
                    canvasScaler.style.transform = orig;
                    return canvas;
                } catch (e) {
                    canvasScaler.style.transform = orig;
                    showToast("Generation failed.", true);
                    return null;
                }
            }

            btnDownload.addEventListener('click', async () => {
                const old = btnDownload.innerHTML;
                btnDownload.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>';
                const c = await captureCanvas();
                if (c) {
                    const link = document.createElement('a');
                    link.download = `MobiHub_${Date.now()}.png`;
                    link.href = c.toDataURL('image/png');
                    link.click();
                    shootConfetti(btnDownload);
                    showToast("Image Downloaded!");
                }
                btnDownload.innerHTML = old;
            });

            btnCopy.addEventListener('click', async () => {
                if (currentInventory.length === 0) {
                    showToast("Inventory is empty.", true);
                    return;
                }
                const old = btnCopy.innerHTML;
                btnCopy.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>';
                const c = await captureCanvas();
                if (!c) { btnCopy.innerHTML = old; return; }

                c.toBlob(async (blob) => {
                    try {
                        if (navigator.clipboard && navigator.clipboard.write) {
                            const data = [new ClipboardItem({ [blob.type]: blob })];
                            await navigator.clipboard.write(data);
                            shootConfetti(btnCopy);
                            showToast("Image Copied to Clipboard!");
                        } else {
                            throw new Error("Clipboard API unavailable");
                        }
                    } catch (err) {
                        console.error('Clipboard Error:', err);
                        showToast("Copy blocked. Please use Download button.", true);
                        btnCopy.classList.add('animate-shake');
                        setTimeout(() => btnCopy.classList.remove('animate-shake'), 400);
                    }
                    btnCopy.innerHTML = old;
                }, 'image/png');
            });
        });
    </script>
</body>
</html>
