        const COLORS = [
            { id: 'mobi', name: 'Mobi Brand', bg: 'bg-cyan-600', text: 'text-cyan-700', base: 'cyan' },
            { id: 'slate', name: 'Clean Slate', bg: 'bg-slate-800', text: 'text-slate-800', base: 'slate' },
            { id: 'violet', name: 'Ultra Violet', bg: 'bg-violet-600', text: 'text-violet-600', base: 'violet' },
            { id: 'blue', name: 'Royal Blue', bg: 'bg-blue-600', text: 'text-blue-600', base: 'blue' },
            { id: 'rose', name: 'Neon Rose', bg: 'bg-rose-600', text: 'text-rose-600', base: 'rose' },
            { id: 'amber', name: 'Sunset Orange', bg: 'bg-amber-600', text: 'text-amber-600', base: 'amber' },
            { id: 'emerald', name: 'Eco Green', bg: 'bg-emerald-600', text: 'text-emerald-600', base: 'emerald' },
        ];

        let state = {
            darkMode: false,
            colorId: 'mobi',
            listData: [],
            aiImage: null
        };

        // --- DOM REFS ---
        const $ = (id) => document.getElementById(id);
        
        // --- INIT ---
        window.onload = () => {
            // Listeners - Safe binding FIRST to ensure they are attached even if UI renders fail
            const safeBind = (id, fn) => {
                const el = $(id);
                if(el) el.onclick = fn;
            };

            safeBind('toggle-settings-btn', () => $('settings-panel').classList.toggle('hidden'));
            safeBind('mode-light', () => setThemeMode(false));
            safeBind('mode-dark', () => setThemeMode(true));
            
            if($('story-title-input')) $('story-title-input').oninput = (e) => $('preview-title').innerText = e.target.value;
            if($('preset-dropdown')) $('preset-dropdown').onchange = (e) => {
                $('story-title-input').value = e.target.value;
                $('preview-title').innerText = e.target.value;
            };
            
            // Auto-save Key on Input
            if($('api-key')) {
                $('api-key').oninput = (e) => localStorage.setItem('gemini_api_key', e.target.value);
            }

            if($('logo-input')) $('logo-input').onchange = handleLogo;
            
            // Reset Logo Button
            safeBind('reset-logo-btn', () => {
                localStorage.removeItem('custom_logo');
                if($('logo-input')) $('logo-input').value = '';
                if($('logo-area')) $('logo-area').innerHTML = `<h1 class="text-5xl font-extrabold tracking-tight drop-shadow-sm text-slate-900">MOBI HUB</h1>`;
                if($('default-app-icon')) $('default-app-icon').classList.remove('hidden');
                if($('custom-app-logo')) $('custom-app-logo').classList.add('hidden');
                if($('reset-logo-btn')) $('reset-logo-btn').classList.add('hidden');
            });
            
            safeBind('btn-process', processList);
            safeBind('btn-download', downloadCanvas);
            safeBind('btn-ai-poster', generateAi);
            safeBind('close-modal', closeModal);
            safeBind('download-ai-btn', downloadAi);

            // UI Init - Wrapped in try/catch to prevent crashes stopping execution
            try {
                renderSwatches();
                updateTheme();
                updateDate();
                loadStoredSettings(); // Load persisted data
            } catch(e) {
                console.error("UI Init failed:", e);
                showError("Visual init failed, but functionality should work.");
            }
        };

        // --- CORE FUNCTIONS ---

        function loadStoredSettings() {
            // Load API Key
            const storedKey = localStorage.getItem('gemini_api_key');
            if(storedKey && $('api-key')) $('api-key').value = storedKey;

            // Load Logo
            const storedLogo = localStorage.getItem('custom_logo');
            if(storedLogo) applyLogo(storedLogo);
        }

        function renderSwatches() {
            const container = $('swatch-container');
            if(!container) return;
            container.innerHTML = COLORS.map(c => `
                <button onclick="setBrandColor('${c.id}')" 
                    class="w-8 h-8 rounded-full ${c.bg} border-2 border-white shadow-sm hover:scale-110 transition-transform" 
                    title="${c.name}"></button>
            `).join('');
        }

        function setBrandColor(id) {
            state.colorId = id;
            updateTheme();
        }

        function setThemeMode(isDark) {
            state.darkMode = isDark;
            updateTheme();
        }

        function updateDate() {
            const d = new Date();
            const str = d.toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });
            if($('date-display')) $('date-display').innerText = str;
        }

        function handleLogo(e) {
            const file = e.target.files[0];
            if(file) {
                // 1. Check file size (limit to 2MB for localStorage)
                if (file.size > 2 * 1024 * 1024) {
                    alert("Image is too large to save (Max 2MB). It will be used for this session only.");
                    const url = URL.createObjectURL(file);
                    applyLogo(url);
                    return;
                }

                // 2. Read as base64 for persistence
                const reader = new FileReader();
                reader.onload = function(evt) {
                    const base64 = evt.target.result;
                    try {
                        localStorage.setItem('custom_logo', base64);
                    } catch (err) {
                        console.error("Storage full or error:", err);
                        alert("Could not save logo to local storage.");
                    }
                    applyLogo(base64);
                };
                reader.readAsDataURL(file);
            }
        }

        function applyLogo(url) {
            // Canvas Logo
            if($('logo-area')) $('logo-area').innerHTML = `<img src="${url}" class="max-h-full max-w-full object-contain">`;
            // App Icon
            if($('default-app-icon')) $('default-app-icon').classList.add('hidden');
            if($('custom-app-logo')) {
                $('custom-app-logo').src = url;
                $('custom-app-logo').classList.remove('hidden');
            }
            // Show reset button
            if($('reset-logo-btn')) $('reset-logo-btn').classList.remove('hidden');
        }

        // --- THEME ENGINE (Vanilla) ---
        function updateTheme() {
            const isDark = state.darkMode;
            const theme = COLORS.find(c => c.id === state.colorId) || COLORS[0];
            const base = theme.base;

            // Safe Update Helper
            const safeClass = (id, cls) => { const el = $(id); if(el) el.className = cls; }

            // Update Toggle Buttons
            safeClass('mode-light', `p-2 rounded-md transition-all ${!isDark ? `bg-white shadow text-${base}-600` : 'text-slate-400 hover:text-slate-600'}`);
            safeClass('mode-dark', `p-2 rounded-md transition-all ${isDark ? 'bg-white shadow text-slate-900' : 'text-slate-400 hover:text-slate-600'}`);

            // Update UI Accents
            safeClass('app-logo-bg', `w-14 h-14 bg-slate-900 rounded-2xl flex items-center justify-center text-white overflow-hidden p-2 shadow-lg shadow-${base}-200`);
            safeClass('status-dot', `w-2 h-2 rounded-full animate-pulse bg-${base}-500`);
            safeClass('btn-process', `flex-1 py-4 rounded-xl font-bold flex items-center justify-center gap-2 transition-all shadow-lg bg-${base}-600 hover:bg-${base}-700 text-white shadow-${base}-200`);
            safeClass('btn-download', `px-6 py-4 rounded-xl font-bold text-slate-700 bg-white border border-slate-200 hover:bg-slate-50 flex items-center gap-2 transition-all shadow-sm hover:shadow-md active:scale-[0.98] disabled:opacity-50 disabled:cursor-not-allowed hover:text-${base}-600`);

            // PREVIEW PANE COLORS
            safeClass('preview-panel', `w-full lg:w-1/2 flex items-center justify-center p-8 overflow-hidden relative transition-colors duration-500 ${isDark ? 'bg-slate-900' : 'bg-slate-200'}`);
            if($('preview-panel')) $('preview-panel').firstElementChild.style.backgroundImage = `radial-gradient(${isDark ? '#ffffff' : '#000000'} 1px, transparent 1px)`;

            // CANVAS COLORS
            safeClass('canvas-content', `w-[414px] h-[896px] relative flex flex-col overflow-hidden font-sans transition-colors duration-500 ${isDark ? 'bg-[#1e293b] text-white' : 'bg-white text-slate-900'}`);
            
            // Background
            safeClass('canvas-bg', `absolute inset-0 ${isDark ? 'bg-gradient-to-b from-slate-800 to-[#0f172a]' : 'bg-white'}`);
            const blobClass = isDark ? `bg-${base}-600/20` : 'bg-transparent'; 
            safeClass('blob-1', `absolute -top-[20%] right-[-10%] w-[500px] h-[500px] rounded-full blur-[100px] ${blobClass}`);
            safeClass('blob-2', `absolute -bottom-[10%] left-[-10%] w-[400px] h-[400px] rounded-full blur-[100px] ${blobClass}`);

            // Header Elements
            safeClass('date-badge', `flex items-center gap-2 mb-8 backdrop-blur-md px-4 py-1.5 rounded-full border ${isDark ? 'bg-white/10 border-white/5' : 'bg-slate-100/50 border-slate-200 shadow-sm'}`);
            if($('date-badge')) $('date-badge').firstElementChild.setAttribute('class', `text-${base}-600`); 
            safeClass('date-display', `text-[10px] font-semibold tracking-widest uppercase ${isDark ? `text-${base}-200` : 'text-slate-600'}`);
            
            // Title
            safeClass('preview-title', `text-2xl font-bold tracking-tight mb-2 inline-block relative z-10 ${isDark ? 'text-white' : 'text-slate-800'}`);
            safeClass('title-bar', `h-1 w-12 bg-${base}-600 rounded-full mx-auto opacity-80`);

            // Footer
            safeClass('footer-box', `backdrop-blur-xl rounded-2xl p-4 border text-center transition-all duration-300 ${isDark ? 'bg-slate-900/90 border-white/10 shadow-black/50' : 'bg-white border-slate-100 shadow-xl'}`);
            safeClass('footer-btn', `flex justify-center items-center gap-2 mb-4 py-2.5 rounded-xl border transition-colors bg-${base}-600 border-transparent shadow-md`);
            safeClass('footer-trust', `flex justify-center gap-5 mb-3 opacity-90 ${isDark ? 'text-slate-300' : `text-${base}-700`}`);
            safeClass('footer-loc', `border-t pt-3 flex items-center justify-center gap-2 ${isDark ? 'border-white/10 text-slate-400' : 'border-slate-100 text-slate-500'}`);
            if($('footer-loc')) $('footer-loc').firstElementChild.setAttribute('class', isDark ? '' : `text-${base}-600`);

            if(state.listData.length > 0) renderListItems();
        }

        // --- LOGIC ---
        async function processList() {
            const key = $('api-key').value;
            const text = $('raw-input').value;
            
            if(!key) return alert('Please enter API Key in settings');
            if(!text) return alert('Please paste a list');

            const btn = $('btn-process');
            btn.innerHTML = `<svg class="animate-spin-custom h-5 w-5 text-white" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> Processing...`;
            btn.disabled = true;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${key}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        contents: [{ parts: [{ text }] }],
                        systemInstruction: { parts: [{ text: `Extract WTS list. Input: "iPhone 13 128GB A Grade 550". Output JSON: [{"model":"iPhone 13","spec":"128GB","grade":"A Grade","price":"€550"}]. Rules: Capitalize nicely. Ensure currency.` }] },
                        generationConfig: { responseMimeType: "application/json" }
                    })
                });
                
                const data = await response.json();
                if(data.error) throw new Error(data.error.message);
                
                let cleanText = data.candidates[0].content.parts[0].text;
                cleanText = cleanText.replace(/```json|```/g, '').trim();

                state.listData = JSON.parse(cleanText);
                renderListItems();
                
                $('btn-download').disabled = false;
                $('btn-ai-poster').disabled = false;
                // Safe fix for AI button recoloring
                if($('btn-ai-poster') && $('btn-ai-poster').firstElementChild) {
                    $('btn-ai-poster').firstElementChild.setAttribute('class', `text-${getThemeBase()}-600`);
                }

            } catch (e) {
                showError(e.message);
            } finally {
                btn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/></svg> Generate Design`;
                btn.disabled = false;
            }
        }

        function renderListItems() {
            const listEl = $('list-wrapper');
            if(!listEl) return;
            listEl.innerHTML = '<div class="flex flex-col gap-3"></div>';
            const container = listEl.firstElementChild;
            const isDark = state.darkMode;
            const base = getThemeBase();

            state.listData.forEach((item, idx) => {
                let gradeClass = 'bg-slate-500 text-white';
                const g = item.grade ? item.grade.toLowerCase() : '';
                if(g.includes('new')) gradeClass = 'bg-emerald-500 text-white';
                else if(g.includes('a')) gradeClass = 'bg-indigo-500 text-white';
                
                const cardBg = isDark ? 'bg-white/5 border-white/10' : 'bg-white border-slate-100 shadow-sm';
                const textCol = isDark ? 'text-white' : 'text-slate-900';
                const specCol = isDark ? `text-${base}-200` : `text-${base}-600`;

                const html = `
                    <div class="relative group fade-in" style="animation-delay: ${idx * 50}ms">
                        <div class="relative backdrop-blur-md p-3.5 rounded-xl border flex items-center justify-between overflow-hidden ${cardBg}">
                            <div class="pl-2 flex items-center justify-between relative z-10 w-full">
                                <div class="flex items-baseline gap-2.5">
                                    <span class="font-bold text-[14px] tracking-tight ${textCol}">${item.model || 'Unknown Model'}</span>
                                    <span class="text-lg font-black italic tracking-tighter ${specCol}">${item.spec || ''}</span>
                                </div>
                                <span class="text-[10px] font-bold px-2 py-1 rounded ml-2 whitespace-nowrap shadow-sm ${gradeClass}">${item.grade ? item.grade.toUpperCase() : 'USED'}</span>
                            </div>
                        </div>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', html);
            });
        }

        async function downloadCanvas() {
            const target = $('capture-target');
            if (!target) return showError("Capture target not found.");

            // Visual feedback
            const btn = $('btn-download');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<span class="text-sm font-bold">Saving...</span>';
            btn.disabled = true;

            try {
                // Wait a moment for any styles/images to settle
                await new Promise(resolve => setTimeout(resolve, 200));

                const canvas = await html2canvas(target, { 
                    scale: 2, 
                    useCORS: true, 
                    logging: true, 
                    backgroundColor: null,
                    allowTaint: false, // Must be false to allow downloading
                    ignoreElements: (element) => {
                        // Ignore hidden images with no src to prevent errors
                        if (element.tagName === 'IMG' && (!element.src || element.src === window.location.href)) return true;
                        return false;
                    }
                });

                const link = document.createElement('a');
                link.download = `MobiHub-Story-${Date.now()}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
                
            } catch(e) {
                console.error("Download Error:", e);
                showError("Download failed: " + (e.message || "Unknown error"));
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }

        async function generateAi() {
            const btn = $('btn-ai-poster');
            btn.disabled = true;
            btn.innerHTML = 'Generating...';
            
            try {
                const key = $('api-key').value;
                const prompt = `Professional product photo of ${state.listData[0] ? state.listData[0].model : 'smartphone'}, cinematic lighting, modern ${state.darkMode ? 'dark' : 'white'} studio, premium 8k.`;
                
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${key}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ instances: [{ prompt }], parameters: { sampleCount: 1 } })
                });
                
                const data = await res.json();
                if(data.error) throw new Error(data.error.message);
                
                const b64 = data.predictions[0].bytesBase64Encoded;
                $('ai-result-img').src = `data:image/png;base64,${b64}`;
                $('ai-result-img').classList.remove('hidden');
                
                $('ai-modal').classList.remove('hidden');
                setTimeout(() => $('ai-modal').classList.remove('opacity-0'), 10);
                
            } catch(e) {
                showError(e.message);
            } finally {
                btn.disabled = false;
                btn.innerHTML = 'Generate AI Ad Image';
            }
        }

        function downloadAi() {
            const src = $('ai-result-img').src;
            if(!src) return;
            const link = document.createElement('a');
            link.download = 'AI-Ad.png';
            link.href = src;
            link.click();
        }

        function closeModal() {
            $('ai-modal').classList.add('opacity-0');
            setTimeout(() => $('ai-modal').classList.add('hidden'), 300);
        }

        function showError(msg) {
            $('error-text').innerText = msg;
            $('error-box').classList.remove('hidden');
            setTimeout(() => $('error-box').classList.add('hidden'), 5000);
        }

        function getThemeBase() {
            const theme = COLORS.find(c => c.id === state.colorId) || COLORS[0];
            return theme.base;
        }

    </script>
</body>
</html>
